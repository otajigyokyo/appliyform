<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員詳細 - 買出人章管理システム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    
    /* ヘッダー部分 */
    .header {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 25px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 3px solid #667eea;
    }
    
    .photo-container {
      width: 100px;
      height: 130px;
      border: 3px solid #667eea;
      border-radius: 8px;
      overflow: hidden;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .photo-placeholder {
      color: #adb5bd;
      font-size: 12px;
      text-align: center;
    }
    
    .member-info {
      flex: 1;
    }
    
    /* ヘッダー内の項目スタイル */
    .header-item {
      margin-bottom: 8px;
    }
    
    .header-item:last-child {
      margin-bottom: 0;
    }
    
    .header-label {
      font-size: 11px;
      color: #6c757d;
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .header-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    
    .member-id-box {
      display: inline-block;
    }
    
    .member-id {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
    }
    
    .status-box {
      display: inline-block;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
    
    .status-active {
      background: #d4edda;
      color: #155724;
      border: 1px solid #28a745;
    }
    
    .status-inactive {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #dc3545;
    }
    
    .status-pending {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .status-duplicate {
      background: #e2e3e5;
      color: #495057;
      border: 1px solid #6c757d;
    }

    .status-duplicate-deleted {
      background: #8b5cf6;
      color: white;
      border: 1px solid #7c3aed;
    }
    
    .store-name {
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }
    
    .wearer-name {
      font-size: 18px;
      color: #333;
      font-weight: 500;
    }
    
    .furigana {
      font-size: 12px;
      color: #888;
      font-weight: normal;
      margin-left: 8px;
    }
    
    /* セクション */
    .section {
      padding: 20px 25px;
      border-bottom: 1px solid #e9ecef;
    }
    
    .section:last-child {
      border-bottom: none;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 15px;
      padding-left: 10px;
      border-left: 4px solid #667eea;
    }
    
    /* 情報グリッド */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .info-item {
      background: #f8f9fa;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }
    
    .info-item.full-width {
      grid-column: 1 / -1;
    }
    
    .info-label {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 16px;
      color: #333;
      font-weight: 500;
    }
    
    .info-value .furigana {
      display: block;
      margin-left: 0;
      margin-top: 2px;
    }
    
    .info-value.expires {
      color: #dc3545;
      font-size: 18px;
    }
    
    /* 印刷回数 */
    .print-counts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .print-box {
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .print-box.card {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border: 2px solid #2196f3;
    }
    
    .print-box.app {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border: 2px solid #4caf50;
    }
    
    .print-label {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .print-count {
      font-size: 36px;
      font-weight: bold;
    }
    
    .print-box.card .print-count {
      color: #1976d2;
    }
    
    .print-box.app .print-count {
      color: #388e3c;
    }
    
    .print-unit {
      font-size: 14px;
      color: #666;
    }
    
    /* QRコード */
    .qr-section {
      text-align: center;
      padding: 20px;
    }
    
    .qr-image {
      width: 150px;
      height: 150px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
    }
    
    .qr-placeholder {
      width: 150px;
      height: 150px;
      background: #f8f9fa;
      border: 2px dashed #dee2e6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      margin: 0 auto;
    }
    
    /* 書類リンク */
    .document-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .doc-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      text-decoration: none;
      color: #333;
      transition: all 0.2s;
    }
    
    .doc-link:hover {
      background: #e9ecef;
      border-color: #667eea;
      transform: translateY(-2px);
    }
    
    .doc-link.disabled {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }
    
    .doc-icon {
      font-size: 28px;
    }
    
    .doc-text {
      flex: 1;
    }
    
    .doc-title {
      font-weight: bold;
      font-size: 14px;
    }
    
    .doc-desc {
      font-size: 12px;
      color: #6c757d;
    }
    
    /* 編集モード */
    .edit-input, .edit-select {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #667eea;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: #333;
    }

    .edit-input:focus, .edit-select:focus {
      outline: none;
      border-color: #764ba2;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .edit-select {
      cursor: pointer;
    }

    .info-item.editing {
      background: #f0f0ff;
      border-color: #667eea;
    }

    .header-item.editing {
      background: #f0f0ff;
      padding: 8px;
      border-radius: 6px;
    }

    .btn-edit {
      background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
      color: white;
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
    }

    .btn-save {
      background: linear-gradient(135deg, #28a745 0%, #218838 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
    }

    .btn-cancel {
      background: #6c757d;
      color: white;
    }

    .btn-cancel:hover {
      background: #5a6268;
    }

    .actions.edit-mode {
      grid-template-columns: 1fr 1fr;
    }

    /* アクションボタン */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      padding: 20px 25px;
      background: #f8f9fa;
    }
    
    .btn {
      padding: 15px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-app {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    
    .btn-app:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
    }
    
    .btn-close {
      background: #6c757d;
      color: white;
    }
    
    .btn-close:hover {
      background: #5a6268;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* ローディング */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: #666;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e9ecef;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* エラー */
    .error {
      text-align: center;
      padding: 60px;
      color: #dc3545;
    }
    
    .error-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    /* レスポンシブ */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      
      .header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      
      .header-row {
        flex-direction: column;
        gap: 8px;
      }

      #duplicateMemoSection {
        margin-left: 0 !important;
      }

      .member-id {
        font-size: 24px;
      }
      
      .info-grid,
      .print-counts,
      .document-links,
      .actions {
        grid-template-columns: 1fr;
      }
      
      .btn {
        padding: 12px 15px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ローディング -->

    </div>
    
    <!-- エラー -->
    <div id="error" class="error" style="display: none;">

    </div>
    
    <!-- メインコンテンツ -->
    <div id="content" style="display: none;">
      <!-- ヘッダー -->
      <div class="header">
        <div class="photo-container">
          <img id="photo" src="" alt="会員写真" style="display: none;">
          <div id="photo-placeholder" class="photo-placeholder">📷会員写真</div>
        </div>
        <div class="member-info">

          <!-- 店名 -->
          <div class="header-item">

            <div id="store-name" class="store-name">店名</div>
          </div>
          <!-- 着用者氏名 -->
          <div class="header-item">

      <!-- アクションボタン（通常モード） -->
      <div class="actions" id="normalActions">

        <button class="btn btn-cancel" onclick="cancelEdit()">

      <!-- 基本情報 -->
      <div class="section">

        <div class="info-grid">

            <div class="info-label">代表者氏名</div>

      <!-- 資格情報 -->

      <!-- QRコード -->

        <div class="section-title">📱 認証用QRコード</div>
        <div class="qr-section">
          <img id="qr-image" class="qr-image" src="" alt="QRコード" style="display: none;">
          <div id="qr-placeholder" class="qr-placeholder">QRコードなし</div>
        </div>
      </div>
      
    </div>

  <script>
    // API設定
    const API_URL = 'https://script.google.com/macros/s/AKfycbwbbyZoRzhWu8Ft5xVvyI1LJc7_RLZaeLwVGapXnlYIIJBUSlgJXQTzofwuLl5nux43kg/exec';
    
    // URLパラメータ取得
    const urlParams = new URLSearchParams(window.location.search);
    const rowNumber = urlParams.get('row');
    const memberId = urlParams.get('member_id');
    
    // 会員データ保持用
    let memberData = null;
    
    // 初期化
    document.addEventListener('DOMContentLoaded', loadMemberDetail);
    
    // 会員詳細を読み込み
    async function loadMemberDetail() {
      try {
        const params = {};
        if (rowNumber) params.rowNumber = rowNumber;
        if (memberId) params.memberId = memberId;
        
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'getMemberDetail',
            ...params
          })
        });
        
        const result = await response.json();
        
        if (result.success && result.member) {
          memberData = result.member;
          console.log('=== getMemberDetail レスポンス ===');
          console.log('representativeNameKana:', result.member.representativeNameKana);
          console.log('wearerNameKana:', result.member.wearerNameKana);
          console.log('全データ:', JSON.stringify(result.member, null, 2));
          displayMemberDetail(memberData);
        } else {
          showError(result.error || '会員情報の取得に失敗しました');
        }
      } catch (error) {
        showError(error.message);
      }
    }
    
    // 会員詳細を表示
    function displayMemberDetail(member) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      
      // ヘッダー情報
      document.getElementById('member-id').textContent = member.memberId || '-';
      document.getElementById('store-name').textContent = member.storeName || '-';
      
      // 着用者氏名（ふりがな付き）
      document.getElementById('wearer-name').textContent = member.wearerName || '-';
      if (member.wearerNameKana) {
        document.getElementById('wearer-name-kana').textContent = '（' + member.wearerNameKana + '）';
      }
      
      // ステータスバッジ
      const statusBadge = document.getElementById('status-badge');
      if (member.status === 'ACTIVE') {
        statusBadge.textContent = '有効';
        statusBadge.className = 'status-badge status-active';
      } else if (member.status === 'INACTIVE') {
        statusBadge.textContent = '無効';
        statusBadge.className = 'status-badge status-inactive';
      } else if (member.status === 'DUPLICATE') {
        statusBadge.textContent = '重複削除';
        statusBadge.className = 'status-badge status-duplicate';
      } else if (member.status === 'DUPLICATE_DELETED') {
        statusBadge.textContent = '二重削除';
        statusBadge.className = 'status-badge status-duplicate-deleted';
      } else {
        statusBadge.textContent = '保留';
        statusBadge.className = 'status-badge status-pending';
      }

      // DUPLICATE_DELETEDの場合、メモセクション表示＆既存メモ読み込み
      if (member.status === 'DUPLICATE_DELETED') {
        document.getElementById('duplicateMemoSection').style.display = 'block';
        if (member.duplicateMemo) {
          document.getElementById('duplicateMemoText').value = member.duplicateMemo;
        }
      }

      // 顔写真
      if (member.photoUrl) {
        const photoImg = document.getElementById('photo');
        photoImg.src = member.photoUrl;
        photoImg.style.display = 'block';
        document.getElementById('photo-placeholder').style.display = 'none';
        
        // 顔写真リンク
        const photoLink = document.getElementById('photo-link');
        if (member.photoLinkUrl) {
          photoLink.href = member.photoLinkUrl;
          photoLink.classList.remove('disabled');
        }
      }
      
      // 公的書類リンク
      /*
      const docLink = document.getElementById('document-link');
      if (member.documentUrl) {
        docLink.href = member.documentUrl;
        docLink.classList.remove('disabled');
      }
      */
      
      // 公的書類リンク ★★★ この部分を置き換え ★★★
      const docLink = document.getElementById('document-link');
      if (member.documentUrl) {
        docLink.href = member.documentUrl;
        docLink.classList.remove('disabled');
        
        // ★ プレビューセクションを表示
        displayDocumentPreview(member.documentUrl, member.documentUrls);
      }
      
      // 基本情報
      // 代表者氏名（ふりがな付き）
      document.getElementById('rep-name').textContent = member.representativeName || '-';
      if (member.representativeNameKana) {
        document.getElementById('rep-name-kana').textContent = '（' + member.representativeNameKana + '）';
      }
      
      document.getElementById('business-type').textContent = member.businessType || '-';

      // 郵便番号・住所の分離表示
      // GAS側が postalCode を別フィールドで返す場合はそのまま使用
      // address に「〒XXX-XXXX」が含まれている場合はフロントで分離（後方互換）
      if (member.postalCode) {
        document.getElementById('postal-code').textContent = '〒' + member.postalCode;
        document.getElementById('address').textContent = member.address || '-';
      } else if (member.address) {
        const postalMatch = member.address.match(/^〒?(\d{3}-?\d{4})\s*/);
        if (postalMatch) {
          const postalCode = postalMatch[1].includes('-') ? postalMatch[1] : postalMatch[1].slice(0, 3) + '-' + postalMatch[1].slice(3);
          document.getElementById('postal-code').textContent = '〒' + postalCode;
          document.getElementById('address').textContent = member.address.slice(postalMatch[0].length).trim() || '-';
          // 分離した値をmemberDataにも反映
          memberData.postalCode = postalCode;
          memberData.address = member.address.slice(postalMatch[0].length).trim();
        } else {
          document.getElementById('postal-code').textContent = '-';
          document.getElementById('address').textContent = member.address;
        }
      } else {
        document.getElementById('postal-code').textContent = '-';
        document.getElementById('address').textContent = '-';
      }
      document.getElementById('phone').textContent = member.phone || '-';
      document.getElementById('fax').textContent = member.fax || '-';
      document.getElementById('email').textContent = member.email || '-';
      
      // 資格情報
      document.getElementById('created-at').textContent = member.createdAt || '-';
      document.getElementById('expires-at').textContent = member.expiresAt || '-';
      
      // 印刷回数
      document.getElementById('card-print-count').textContent = member.cardPrintCount || 0;
      document.getElementById('app-print-count').textContent = member.appPrintCount || 0;
      
      // QRコード
      if (member.qrImageUrl) {
        const qrImg = document.getElementById('qr-image');
        qrImg.src = member.qrImageUrl;
        qrImg.style.display = 'block';
        document.getElementById('qr-placeholder').style.display = 'none';
      }
    }
    
    // エラー表示
    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }

    // 二重削除メモ保存
    async function saveDuplicateMemoHandler() {
      if (!memberData || !memberData.memberId) return;
      var memo = document.getElementById('duplicateMemoText').value;
      var statusEl = document.getElementById('duplicateMemoStatus');
      statusEl.textContent = '保存中...';
      statusEl.style.color = '#666';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveDuplicateMemo',
            memberId: memberData.memberId,
            memo: memo
          })
        });
        const result = await response.json();
        if (result.success) {
          statusEl.textContent = '✓ 保存しました';
          statusEl.style.color = 'green';
          setTimeout(function() { statusEl.textContent = ''; }, 3000);
        } else {
          statusEl.textContent = '保存失敗: ' + (result.error || '');
          statusEl.style.color = 'red';
        }
      } catch (err) {
        statusEl.textContent = 'エラー: ' + err.message;
        statusEl.style.color = 'red';
      }
    }

    // カード生成
    async function generateCard() {
      if (!memberData || !memberData.rowNumber) return;
      
      const btn = document.getElementById('btn-card');
      btn.disabled = true;
      btn.textContent = '生成中...';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'generateCardByRow',
            rowNumber: memberData.rowNumber
          })
        });
        
        const result = await response.json();
        
        // ★ デバッグ用: 実際のレスポンスを確認
        console.log('API Response:', result);
        alert('レスポンス: ' + JSON.stringify(result));
        
        if (result.success && result.slideUrl) {
          window.open(result.slideUrl, '_blank');
          // 印刷回数を更新
          const count = parseInt(document.getElementById('card-print-count').textContent) + 1;
          document.getElementById('card-print-count').textContent = count;
        } else {
          alert('カード生成エラー: ' + (result.error || '不明なエラー'));
        }
      } catch (error) {
        alert('エラー: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🎫 カード生成';
      }
    }
    
    
    // 申請書生成
    async function generateApp() {
      if (!memberData || !memberData.rowNumber) return;
      
      const btn = document.getElementById('btn-app');
      btn.disabled = true;
      btn.textContent = '生成中...';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'generateApplicationFormByRow',
            rowNumber: memberData.rowNumber
          })
        });
        
        const result = await response.json();
        
        if (result.success && result.slideUrl) {
          window.open(result.slideUrl, '_blank');
          // 印刷回数を更新
          const count = parseInt(document.getElementById('app-print-count').textContent) + 1;
          document.getElementById('app-print-count').textContent = count;
        } else {
          alert('申請書生成エラー: ' + (result.error || '不明なエラー'));
        }
      } catch (error) {
        alert('エラー: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '📋 申請書生成';
      }

        // ★★★ ここから追加 ★★★
    // 公的書類のプレビューを表示
// ========== 公的書類プレビュー（複数対応） ========== //
let currentDocumentUrl = '';
let allDocumentUrls = [];
let currentDocIndex = 0;

function displayDocumentPreview(documentUrl, documentUrls) {
  // 複数書類がある場合
  if (documentUrls && documentUrls.length > 0) {
    allDocumentUrls = documentUrls;
  } else if (documentUrl) {
    allDocumentUrls = [{ name: '公的書類', url: documentUrl }];
  } else {
    return;
  }

  // タブを生成
  const tabsEl = document.getElementById('docTabs');
  if (allDocumentUrls.length > 1) {
    tabsEl.innerHTML = allDocumentUrls.map((doc, i) => {
      const shortName = doc.name.replace(/^公的書類_\d+_/, '').replace(/\.[^.]+$/, '');
      return `<button onclick="switchDoc(${i})" id="docTab${i}" 
                style="padding: 8px 16px; border: 2px solid ${i === 0 ? '#667eea' : '#ddd'}; 
                       background: ${i === 0 ? '#667eea' : 'white'}; 
                       color: ${i === 0 ? 'white' : '#333'}; 
                       border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s;">
                📄 書類${i + 1}: ${shortName || '書類' + (i + 1)}
              </button>`;
    }).join('');
    tabsEl.style.display = 'flex';

    // 「全書類を開く」ボタン表示
    document.getElementById('btnOpenAll').style.display = 'inline-flex';
  } else {
    tabsEl.style.display = 'none';
    document.getElementById('btnOpenAll').style.display = 'none';
  }

  // 最初の書類を表示
  switchDoc(0);

  // セクション表示
  document.getElementById('documentPreviewSection').style.display = 'block';
}

function switchDoc(index) {
  if (index < 0 || index >= allDocumentUrls.length) return;
  
  currentDocIndex = index;
  const doc = allDocumentUrls[index];
  currentDocumentUrl = doc.url;
  
  // iframe更新
  const previewUrl = doc.url.replace('/view', '/preview');
  document.getElementById('documentPreview').src = previewUrl;
  
  // 書類情報表示
  const infoEl = document.getElementById('docInfo');
  const sizeText = doc.size ? ` (${(doc.size / 1024).toFixed(0)} KB)` : '';
  infoEl.textContent = `${doc.name}${sizeText} ― ${index + 1} / ${allDocumentUrls.length} 件`;
  
  // タブのスタイル更新
  allDocumentUrls.forEach((_, i) => {
    const tab = document.getElementById('docTab' + i);
    if (tab) {
      tab.style.background = i === index ? '#667eea' : 'white';
      tab.style.color = i === index ? 'white' : '#333';
      tab.style.borderColor = i === index ? '#667eea' : '#ddd';
    }
  });
}

function openDocumentNewTab() {
  if (currentDocumentUrl) {
    window.open(currentDocumentUrl, '_blank');
  } else {
    alert('公的書類が登録されていません');
  }
}

function openAllDocuments() {
  allDocumentUrls.forEach(doc => {
    window.open(doc.url, '_blank');
  });
}

function printDocument() {
  if (currentDocumentUrl) {
    const printWindow = window.open(currentDocumentUrl, '_blank');
    if (printWindow) {
      printWindow.onload = function() {
        setTimeout(() => { printWindow.print(); }, 1000);
      };
    } else {
      alert('ポップアップブロックを解除してください');
    }
  } else {
    alert('公的書類が登録されていません');
  }
}

    
    // 印刷ダイアログを表示
    function printDocument() {
      if (currentDocumentUrl) {
        // 新しいウィンドウで開いて印刷ダイアログを表示
        const printWindow = window.open(currentDocumentUrl, '_blank');
        
        if (printWindow) {
          // ウィンドウが読み込まれたら印刷ダイアログを表示
          printWindow.onload = function() {
            setTimeout(() => {
              printWindow.print();
            }, 1000);
          };
        } else {
          alert('ポップアップブロックを解除してください');
        }
      } else {
        alert('公的書類が登録されていません');
      }
    }
    // ★★★ ここまで追加 ★★★

    // ========== 編集モード ========== //
    let isEditMode = false;

    // 編集対象フィールドの定義
    const editableFields = [
      { key: 'storeName', elementId: 'store-name', label: '店名', type: 'text', section: 'header' },
      { key: 'wearerName', elementId: 'wearer-name', label: '着用者氏名', type: 'text', section: 'header' },
      { key: 'wearerNameKana', elementId: 'wearer-name-kana', label: '着用者ふりがな', type: 'text', section: 'header' },
      { key: 'status', elementId: 'status-badge', label: 'ステータス', type: 'select', section: 'header' },
      { key: 'representativeName', elementId: 'rep-name', label: '代表者名', type: 'text', section: 'info' },
      { key: 'representativeNameKana', elementId: 'rep-name-kana', label: '代表者ふりがな', type: 'text', section: 'info' },
      { key: 'businessType', elementId: 'business-type', label: '業態', type: 'text', section: 'info' },
      { key: 'postalCode', elementId: 'postal-code', label: '郵便番号', type: 'text', section: 'info' },
      { key: 'address', elementId: 'address', label: '住所', type: 'text', section: 'info' },
      { key: 'phone', elementId: 'phone', label: '電話', type: 'text', section: 'info' },
      { key: 'fax', elementId: 'fax', label: 'FAX', type: 'text', section: 'info' },
      { key: 'email', elementId: 'email', label: 'メール', type: 'text', section: 'info' },
    ];

    const statusOptions = [
      { value: 'ACTIVE', label: '有効' },
      { value: 'INACTIVE', label: '無効' },
      { value: 'DUPLICATE', label: '重複削除' },
      { value: 'DUPLICATE_DELETED', label: '二重削除' },
    ];

    // 元の値を保持
    let originalValues = {};

    function getFieldValue(field) {
      if (field.key === 'status') return memberData.status || '';
      if (field.key === 'wearerNameKana') {
        const raw = memberData.wearerNameKana || '';
        return raw;
      }
      if (field.key === 'representativeNameKana') {
        return memberData.representativeNameKana || '';
      }
      if (field.key === 'postalCode') {
        return memberData.postalCode || '';
      }
      const el = document.getElementById(field.elementId);
      return el ? el.textContent.replace(/^（|）$/g, '').trim() : '';
    }

    function enterEditMode() {
      isEditMode = true;
      originalValues = {};

      editableFields.forEach(field => {
        const el = document.getElementById(field.elementId);
        if (!el) return;

        const currentValue = getFieldValue(field);
        originalValues[field.key] = currentValue;

        if (field.type === 'select') {
          // ステータス: ドロップダウン
          const select = document.createElement('select');
          select.className = 'edit-select';
          select.id = 'edit-' + field.key;
          statusOptions.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.label;
            if (opt.value === currentValue) option.selected = true;
            select.appendChild(option);
          });
          el.replaceWith(select);
        } else {
          // テキストフィールド
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'edit-input';
          input.id = 'edit-' + field.key;
          input.value = currentValue === '-' ? '' : currentValue;
          input.placeholder = field.label;
          el.replaceWith(input);
        }

        // 親要素にeditingクラス
        const inputEl = document.getElementById('edit-' + field.key);
        if (inputEl) {
          const parent = inputEl.closest('.info-item, .header-item, .status-box');
          if (parent) parent.classList.add('editing');
        }
      });

      // ボタン切替
      document.getElementById('normalActions').style.display = 'none';
      document.getElementById('editActions').style.display = 'grid';
    }

    function cancelEdit() {
      if (!confirm('編集内容を破棄しますか？')) return;
      restoreDisplayMode();
    }

    function restoreDisplayMode() {
      isEditMode = false;

      editableFields.forEach(field => {
        const inputEl = document.getElementById('edit-' + field.key);
        if (!inputEl) return;

        // editingクラス削除
        const parent = inputEl.closest('.info-item, .header-item, .status-box');
        if (parent) parent.classList.remove('editing');

        if (field.type === 'select') {
          const badge = document.createElement('span');
          badge.id = field.elementId;
          const status = memberData.status || '';
          if (status === 'ACTIVE') {
            badge.textContent = '有効';
            badge.className = 'status-badge status-active';
          } else if (status === 'INACTIVE') {
            badge.textContent = '無効';
            badge.className = 'status-badge status-inactive';
          } else if (status === 'DUPLICATE') {
            badge.textContent = '重複削除';
            badge.className = 'status-badge status-duplicate';
          } else if (status === 'DUPLICATE_DELETED') {
            badge.textContent = '二重削除';
            badge.className = 'status-badge status-duplicate-deleted';
          } else {
            badge.textContent = '保留';
            badge.className = 'status-badge status-pending';
          }
          inputEl.replaceWith(badge);
        } else {
          const span = document.createElement('span');
          span.id = field.elementId;
          if (field.key === 'wearerNameKana' || field.key === 'representativeNameKana') {
            span.className = 'furigana';
            const kana = field.key === 'wearerNameKana' ? memberData.wearerNameKana : memberData.representativeNameKana;
            span.textContent = kana ? '（' + kana + '）' : '';
          } else if (field.key === 'postalCode') {
            span.className = 'info-value';
            const pc = memberData.postalCode;
            span.textContent = pc ? '〒' + pc : '-';
          } else if (field.key === 'storeName') {
            span.className = 'store-name';
            span.textContent = memberData.storeName || '-';
          } else if (field.key === 'wearerName') {
            span.textContent = memberData.wearerName || '-';
          } else if (field.key === 'representativeName') {
            span.textContent = memberData.representativeName || '-';
          } else {
            span.className = 'info-value';
            span.textContent = memberData[field.key] || '-';
          }
          inputEl.replaceWith(span);
        }
      });

      // ボタン切替
      document.getElementById('normalActions').style.display = 'grid';
      document.getElementById('editActions').style.display = 'none';
    }

    async function saveEdit() {
      const updates = {};
      let hasChanges = false;

      editableFields.forEach(field => {
        const inputEl = document.getElementById('edit-' + field.key);
        if (!inputEl) return;
        const newValue = inputEl.value.trim();
        if (newValue !== originalValues[field.key]) {
          hasChanges = true;
        }
        updates[field.key] = newValue;
      });

      if (!hasChanges) {
        alert('変更がありません。');
        return;
      }

      if (!confirm('変更内容を保存しますか？')) return;

      const saveBtn = document.getElementById('btn-save');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'updateMember',
            rowNumber: memberData.rowNumber,
            updates: updates
          })
        });

        const result = await response.json();

        if (result.success) {
          // memberDataを更新
          Object.keys(updates).forEach(key => {
            memberData[key] = updates[key];
          });

          restoreDisplayMode();
          alert('保存しました。');
        } else {
          alert('保存エラー: ' + (result.error || '不明なエラー'));
        }
      } catch (error) {
        alert('保存中にエラーが発生しました: ' + error.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 保存';
      }
    }
  </script>
